<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="box">
        <p>WEATHER API</p>
    </div>
    <div class="card">
        <div class="search">
            <input type="text" id="city-input" placeholder="Enter city name" spellcheck="false">
            <button><img src="images.jpg"></button>
        </div>
        <div class="error">
          <p>Invalid city name</p>
        </div>
        <div class="weather">
            <img src="download (1).jpg" class="weather-icon">
            <h1 class="temp">22°C</h1>
            <h2 class="city">India</h2>
            <div class="details">
            <div class="col">
                <img src="download (2).jpg">
                <div>
                    <p class="humidity">50%</p>
                    <p>humidity</p>
                </div>
            </div>
            <div class="col">
                <img src="images (1).jpg">
                <div>
                    <p class="wind">15 km/h</p>
                    <p>Wind Speed</p>
                </div>
            </div>

        </div>
        </div>
    </div>


    <script src="weather.js"></script>

    
</body>
</html>
